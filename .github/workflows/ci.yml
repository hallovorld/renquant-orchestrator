name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RENQUANT_HAS_CI_TOKEN: ${{ secrets.AGENT_GIT_PUSH_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: renquant-orchestrator
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: hallovorld/renquant-common
          path: renquant-common
          token: ${{ secrets.AGENT_GIT_PUSH_TOKEN || github.token }}
      - uses: actions/checkout@v4
        if: env.RENQUANT_HAS_CI_TOKEN == 'true'
        with:
          repository: hallovorld/renquant-base-data
          path: renquant-base-data
          token: ${{ secrets.AGENT_GIT_PUSH_TOKEN }}
      - uses: actions/checkout@v4
        if: env.RENQUANT_HAS_CI_TOKEN == 'true'
        with:
          repository: hallovorld/renquant-artifacts
          path: renquant-artifacts
          token: ${{ secrets.AGENT_GIT_PUSH_TOKEN }}
      - uses: actions/checkout@v4
        if: env.RENQUANT_HAS_CI_TOKEN == 'true'
        with:
          repository: hallovorld/renquant-strategy-104
          path: renquant-strategy-104
          token: ${{ secrets.AGENT_GIT_PUSH_TOKEN }}
      - uses: actions/checkout@v4
        if: env.RENQUANT_HAS_CI_TOKEN == 'true'
        with:
          repository: hallovorld/renquant-model
          path: renquant-model
          token: ${{ secrets.AGENT_GIT_PUSH_TOKEN }}
      - uses: actions/checkout@v4
        if: env.RENQUANT_HAS_CI_TOKEN == 'true'
        with:
          repository: hallovorld/renquant-pipeline
          path: renquant-pipeline
          token: ${{ secrets.AGENT_GIT_PUSH_TOKEN }}
      - uses: actions/checkout@v4
        if: env.RENQUANT_HAS_CI_TOKEN == 'true'
        with:
          repository: hallovorld/renquant-execution
          path: renquant-execution
          token: ${{ secrets.AGENT_GIT_PUSH_TOKEN }}
      - uses: actions/checkout@v4
        if: env.RENQUANT_HAS_CI_TOKEN == 'true'
        with:
          repository: hallovorld/renquant-backtesting
          path: renquant-backtesting
          token: ${{ secrets.AGENT_GIT_PUSH_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install test tools
        # pandas_market_calendars: two independent NYSE-calendar wrappers depend on
        # it now — NyseSessionCalendar (intraday_quote_logger, #216, RTH session
        # bounds for real-time quote validation) and the freshness guard's own
        # _exchange_calendar/_expected_last_completed_session (retrain_alpha158_fund,
        # #217, last-completed-session + session-gap lag checks). Both wrap the same
        # renquant_execution.preopen_cancel_gate primitive independently by design
        # (see retrain_alpha158_fund.py's "independently-derived expected session"
        # docstring) rather than sharing a helper, so either module's real-calendar
        # tests fail closed with ModuleNotFoundError without this. Also declared as
        # a real dependency in pyproject.toml (#216 r2 CI failure fix).
        run: python -m pip install pytest numpy pandas scipy xgboost pyarrow pydantic cvxpy scikit-learn pandas_market_calendars

      - name: Full multirepo test
        if: env.RENQUANT_HAS_CI_TOKEN == 'true'
        working-directory: renquant-orchestrator
        env:
          CENSUS_ENFORCE: "1"   # gate-writer ratchet (siblings @ main here)
        run: make test
      - name: Focused test without private sibling token
        if: env.RENQUANT_HAS_CI_TOKEN != 'true'
        working-directory: renquant-orchestrator
        run: |
          PYTHONPATH=src:../renquant-common/src python -m pytest -q \
            tests/test_retrain_alpha158_linear.py \
            tests/test_retrain_alpha158_fund.py \
            tests/test_build_wf_manifest_tjp.py
