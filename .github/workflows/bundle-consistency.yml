name: Bundle Consistency Gate

# Hard CI gate for model<->config<->artifact drift.
#
# On 2026-06-23 an XGB deploy hit FOUR consistency contracts one-by-one in
# PRODUCTION (WF-gate metadata absent, calibrator/scorer fingerprint mismatch,
# config fingerprint mismatch, watchlist size mismatch). All four are checkable
# OFFLINE. This job runs the pre-deploy bundle-consistency check's tests so the
# whack-a-mole is caught in CI instead of on the live tree.
#
# These tests use a synthetic temp bundle + injected fingerprint authorities, so
# the gate runs WITHOUT the private sibling repos or the strategy venv — it needs
# no AGENT_GIT_PUSH_TOKEN and works on every PR, including forks.

on:
  push:
    branches: [main]
    paths:
      - "scripts/check_model_bundle_consistency.py"
      - "tests/test_check_model_bundle_consistency.py"
      - "tests/test_bundle_consistency_ci_gate.py"
      - ".github/workflows/bundle-consistency.yml"
  pull_request:
    paths:
      # Model / config / bundle authorities whose drift this gate guards.
      - "scripts/check_model_bundle_consistency.py"
      - "tests/test_check_model_bundle_consistency.py"
      - "tests/test_bundle_consistency_ci_gate.py"
      - ".github/workflows/bundle-consistency.yml"
      - "**/strategy_config*.json"
      - "**/artifacts/**/panel-ltr*.json"
      - "**/artifacts/**/panel-rank-calibration*.json"

jobs:
  bundle-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install test tools
        # No private siblings required: the bundle-consistency tests inject the
        # fingerprint authorities and build a synthetic bundle on a temp dir.
        run: python -m pip install pytest
      - name: Bundle-consistency gate (4 prod contracts, caught offline)
        run: |
          PYTHONPATH=src python -m pytest -q \
            tests/test_check_model_bundle_consistency.py \
            tests/test_bundle_consistency_ci_gate.py
